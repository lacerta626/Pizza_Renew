<head>

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sun-typeface/SUIT@2/fonts/static/woff2/SUIT.css">

<body>
    <div id="header-include"></div>
    <main>
        <section class="store-search-section">
            <div class="inner">
                <div class="section-title-wrap">
                    <h2 class="sub-page-title">FIND A STORE</h2>
                    <p class="sub-page-desc">가까운 피자헛 매장에서 갓 구운 피자를 만나보세요.</p>
                </div>

                <div class="store-container">
                    <div class="store-sidebar">
                        <div class="search-box">
                            <input type="text" placeholder="지역명 또는 매장명 입력">
                            <button type="button" class="btn-search">검색</button>
                        </div>

                        <div class="store-list-wrap">
                            <p class="count-info">검색 결과 <span>2</span>건</p>
                            <ul class="store-list">
                                <li class="store-item active">
                                    <div class="info-top">
                                        <span class="badge-status">배달/포장</span>
                                        <h4>프리미엄 서울역점</h4>
                                    </div>
                                    <p class="address">서울특별시 중구 한강대로 405</p>
                                    <p class="tel">02-1234-5678</p>
                                    <div class="store-btns">
                                        <a href="#" class="btn-order-small">주문하기</a>
                                    </div>
                                </li>
                                <li class="store-item">
                                    <div class="info-top">
                                        <span class="badge-status">포장전용</span>
                                        <h4>종로본점</h4>
                                    </div>
                                    <p class="address">서울특별시 종로구 종로 12</p>
                                    <p class="tel">02-9876-5432</p>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div class="store-map-area">
                        <div id="map" style="width:100%;height:100%;background:#222;">
                            <p style="color:#666; text-align:center; padding-top:250px;">지도를 불러오는 중입니다...</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

<div id="footer-include"></div>
